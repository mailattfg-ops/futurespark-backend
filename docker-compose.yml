services:
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development

  postgres:
    image: postgres:15-alpine
    container_name: futurespark-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=futurespark_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: futurespark-pgadmin
    ports:
      - "8080:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@futurespark.com
      - PGADMIN_DEFAULT_PASSWORD=admin_password
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: futurespark-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: